<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Thumbnail Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .input-section {
            background: white; padding: 1.5rem; border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem;
        }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .upload-box {
            border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 2rem;
            text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .upload-box.dragover { border-color: #3b82f6; background: #eff6ff; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155; }
        input[type="text"], textarea {
            width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1;
            border-radius: 0.5rem; margin-bottom: 1rem; font-size: 1rem;
        }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .card { background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-body { padding: 1rem; }
        .canvas-wrapper { 
            border: 2px solid #e2e8f0; border-radius: 0.5rem; 
            overflow: hidden; cursor: grab; position: relative;
            touch-action: none; /* Quan trọng cho mobile */
        }
        .canvas-wrapper:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: auto; }
        .btn-download {
            width: 100%; padding: 0.8rem; background: #3b82f6; color: white;
            border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;
            margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        @media (max-width: 768px) { .input-grid, .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Thumbnail Generator</h1>
            <p>Kéo thả ảnh và vuốt trực tiếp trên ảnh Portrait để căn chỉnh</p>
        </div>

        <div class="input-section">
            <div class="input-grid">
                <div id="dropZone" class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div style="font-size: 2.5rem;">📤</div>
                    <div style="font-weight: 500; color: #64748b;">Kéo thả hoặc Chạm để chọn ảnh</div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
                <div>
                    <label>Headline</label>
                    <input type="text" id="headline" placeholder="Nhập tiêu đề...">
                    <label>Description (Bản Landscape)</label>
                    <textarea id="description" rows="3" placeholder="Nhập mô tả..."></textarea>
                </div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <div class="card-body">
                    <label>Bản Portrait (Vuốt/Kéo để chỉnh vị trí)</label>
                    <div class="canvas-wrapper" id="portraitWrapper">
                        <canvas id="canvasPortrait"></canvas>
                    </div>
                    <button class="btn-download" onclick="downloadCanvas('canvasPortrait')">Tải xuống Portrait</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-body">
                    <label>Bản Landscape (Review)</label>
                    <div class="canvas-wrapper" style="cursor: default;">
                        <canvas id="canvasLandscape"></canvas>
                    </div>
                    <button class="btn-download" onclick="downloadCanvas('canvasLandscape')">Tải xuống Landscape</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let logoImage = null;
        let isDragging = false;
        let startY = 0;
        let currentYOffset = 0; 
        const logoSrc = 'logo_ttn_white.png'; // Đảm bảo file này cùng thư mục

        // Load Logo
        const loadLogo = () => {
            logoImage = new Image();
            logoImage.src = logoSrc;
            logoImage.onload = () => renderAll();
        };

        // Hàm Wrap Text
        const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
            const words = text.split(' ');
            let line = '';
            let lines = [];
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    lines.push({ text: line, y: y });
                    line = words[n] + ' ';
                    y += lineHeight;
                } else { line = testLine; }
            }
            lines.push({ text: line, y: y });
            return lines;
        };

        // Vẽ Landscape
        const drawLandscape = (canvas) => {
            const ctx = canvas.getContext('2d');
            canvas.width = 1200; canvas.height = 630;
            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (currentImage) {
                const imgW = 500;
                const scale = Math.max(imgW / currentImage.width, canvas.height / currentImage.height);
                ctx.drawImage(currentImage, (imgW - currentImage.width * scale)/2, (canvas.height - currentImage.height * scale)/2, currentImage.width * scale, currentImage.height * scale);
            }
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 48px Arial';
            wrapText(ctx, document.getElementById('headline').value || 'Headline', 540, 150, 620, 60).forEach(l => ctx.fillText(l.text, 540, l.y));
            if (logoImage && logoImage.complete) ctx.drawImage(logoImage, 540, 520, (logoImage.width/logoImage.height)*50, 50);
        };

        // Vẽ Portrait
        const drawPortrait = (canvas) => {
            const ctx = canvas.getContext('2d');
            canvas.width = 1080; canvas.height = 1350;
            if (currentImage) {
                const imgH = 900;
                const scale = Math.max(canvas.width / currentImage.width, imgH / currentImage.height);
                const sw = currentImage.width * scale; const sh = currentImage.height * scale;
                ctx.save(); ctx.rect(0, 0, canvas.width, imgH); ctx.clip();
                ctx.drawImage(currentImage, (canvas.width - sw)/2, (imgH - sh)/2 + currentYOffset, sw, sh);
                ctx.restore();
                const grad = ctx.createLinearGradient(0, imgH - 200, 0, imgH);
                grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.8)');
                ctx.fillStyle = grad; ctx.fillRect(0, imgH - 200, canvas.width, 200);
            }
            ctx.fillStyle = '#e30f16'; ctx.fillRect(0, 900, canvas.width, 450); // Màu đỏ brand
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 64px Arial';
            const lines = wrapText(ctx, document.getElementById('headline').value || 'Your Headline', 60, 980, 960, 80);
            lines.forEach(l => ctx.fillText(l.text, 60, l.y));
            if (logoImage && logoImage.complete) {
                const lh = 55; const lw = (logoImage.width/logoImage.height)*lh;
                ctx.drawImage(logoImage, canvas.width - lw - 60, canvas.height - 80, lw, lh);
                ctx.font = '32px Arial'; ctx.fillText('Link in comments', 60, canvas.height - 80 + (lh/1.5)); // Text đối xứng
            }
        };

        const renderAll = () => {
            drawLandscape(document.getElementById('canvasLandscape'));
            drawPortrait(document.getElementById('canvasPortrait'));
        };

        // --- XỬ LÝ KÉO (PAN) CHO CẢ MOUSE & TOUCH ---
        const pCanvas = document.getElementById('canvasPortrait');
        const startDrag = (y) => { if(!currentImage) return; isDragging = true; startY = y - currentYOffset; };
        const moveDrag = (y) => { if(!isDragging) return; currentYOffset = y - startY; renderAll(); };
        const endDrag = () => { isDragging = false; };

        pCanvas.addEventListener('mousedown', (e) => startDrag(e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientY));
        window.addEventListener('mouseup', endDrag);

        pCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); moveDrag(e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchend', endDrag);

        // --- UPLOAD & DROP ---
        const handleFiles = (files) => {
            if (files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => { currentImage = img; currentYOffset = 0; renderAll(); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(files[0]);
            }
        };

        const dz = document.getElementById('dropZone');
        ['dragover', 'drop'].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); if(ev==='drop') handleFiles(e.dataTransfer.files); }));
        document.getElementById('imageInput').addEventListener('change', (e) => handleFiles(e.target.files));
        document.getElementById('headline').addEventListener('input', renderAll);
        
        const downloadCanvas = (id) => {
            const link = document.createElement('a');
            link.download = id + '.png';
            link.href = document.getElementById(id).toDataURL();
            link.click();
        };

        loadLogo();
    </script>
</body>
</html>
