<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tỉnh Táo Viên v6.0 - Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-900 leading-relaxed">
    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center border-b-2 pb-5 border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-950 tracking-tighter italic">TỈNH TÁO VIÊN <span class="text-blue-600">v6.0</span></h1>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Hệ thống biên tập chuyên sâu & Phân tích logic</p>
            </div>
            <div id="statusBadge" class="hidden px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border-2 shadow-sm"></div>
        </header>
        
        <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200">
            <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-black text-slate-400 uppercase">Input Terminal</span>
                <input type="file" id="fileInput" accept=".docx" class="text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-slate-100 file:text-slate-600 hover:file:bg-slate-200 cursor-pointer transition-all">
            </div>
            <textarea id="editor" class="w-full h-80 p-6 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-50 outline-none transition-all text-base text-slate-800 placeholder:italic" placeholder="Ném bản thảo của bạn vào đây..."></textarea>
            <div class="mt-4 flex justify-end">
                <button onclick="runProofreader()" id="btnSubmit" class="bg-slate-950 text-white px-14 py-4 rounded-2xl hover:bg-blue-700 font-black tracking-widest transition-all active:scale-95 disabled:opacity-50 shadow-lg shadow-blue-200/20 uppercase text-xs">Bắt đầu tổng duyệt</button>
            </div>
        </div>

        <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="space-y-4">
                <h2 class="text-xs font-black text-amber-600 bg-amber-50 px-4 py-2 rounded-lg flex justify-between items-center tracking-[0.2em] uppercase">
                    <span>🧠 Phân tích Logic</span>
                    <span id="logicCount"></span>
                </h2>
                <div id="logicContainer" class="space-y-4"></div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xs font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-lg flex justify-between items-center tracking-[0.2em] uppercase">
                    <span>✍️ Rà soát Ngôn ngữ</span>
                    <span id="lingCount"></span>
                </h2>
                <div id="morassContainer" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // ==========================================
        // CONFIG (Sơn dán API Key vào đây)
        // ==========================================
        const API_KEY = "AIzaSyCiZ26JQQYsLGfYuFdRw9E6MjRGDnK7nl4";
        const MODEL_NAME = "gemini-3.1-flash-lite-preview";

        window.runProofreader = async function() {
            const text = document.getElementById('editor').value.trim();
            if (!text || API_KEY.includes("DÁN")) return alert("Sếp ơi, check lại nội dung hoặc API Key nhé!");

            const btn = document.getElementById('btnSubmit');
            btn.innerText = "ĐANG TỔNG DUYỆT...";
            btn.disabled = true;

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: MODEL_NAME });

                // NÂNG CẤP PROMPT: Chôm từ bạn và "bơm" thêm tiêu chuẩn tòa soạn của mình
                const ultimatePrompt = `Bạn là Trưởng phòng Biên tập kỳ cựu của một tờ báo chính trị - xã hội lớn. Bạn nổi tiếng với "con mắt cú vọ" có thể phát hiện những hạt sạn nhỏ nhất và những lỗ hổng logic tinh vi nhất.

Nhiệm vụ: Soát lỗi toàn bộ văn bản dưới đây với tiêu chuẩn "Không sai một dấu phẩy, không hổng một lập luận".

VĂN BẢN CẦN SOÁT:
---
${text}
---

Yêu cầu phân tích và trả về JSON thuần túy (KHÔNG markdown):
{
  "summary": {
    "typo_count": <tổng lỗi ngôn ngữ>,
    "logic_count": <tổng lỗi logic>,
    "severity": "<Nhẹ|Trung bình|Nặng>",
    "overall_critique": "<Nhận xét tổng quan về chất lượng văn bản trong 1 câu>"
  },
  "linguistic_errors": [
    {
      "type": "<typo|punct|grammar|format|vocabulary|style>",
      "location": "<trích đoạn ngắn chứa lỗi>",
      "original": "<phần bị lỗi>",
      "corrected": "<phần đã sửa>",
      "note": "<Giải thích ngắn gọn quy tắc hoặc lý do sửa, ví dụ: 'Sai ngữ cảnh từ vựng', 'Dấu thanh đặt sai vị trí'>"
    }
  ],
  "logic_errors": [
    {
      "location": "<trích đoạn có vấn đề>",
      "issue": "<Tên lỗi: Mâu thuẫn | Nhảy cóc ý | Tối nghĩa | Diễn đạt kiểu 'Tây'>",
      "argument": "<Lập luận biên tập: Phân tích chi tiết tại sao đoạn này chưa ổn và nó gây khó hiểu cho độc giả như thế nào. Trình bày sắc bén, thuyết phục.>"
    }
  ]
}

LƯU Ý CỰC KỲ QUAN TRỌNG:
1. Soi thật kỹ các từ dễ sai ngữ cảnh (ví dụ: 'tệp khách' phải là 'tệp khách hàng', 'yếu điểm' vs 'điểm yếu').
2. Bắt các lỗi format đặc thù tiếng Việt: dấu phẩy sát từ đứng trước, dấu ba chấm phải là 3 ký tự '.', khoảng trắng giữa con số và đơn vị.
3. Phần logic_errors: Tuyệt đối không nhận xét khơi khơi. Phải giải thích được cái 'hổng' của tư duy tác giả.`;

                const result = await model.generateContent(ultimatePrompt);
                const response = await result.response;
                let raw = response.text().replace(/```json/g, "").replace(/```/g, "").trim();
                
                const data = JSON.parse(raw);
                renderResults(data);

            } catch (err) {
                console.error(err);
                alert("Lỗi hệ thống rồi! Sơn check console coi sao.");
            } finally {
                btn.innerText = "Bắt đầu tổng duyệt";
                btn.disabled = false;
            }
        }

        function renderResults(data) {
            document.getElementById('results').classList.remove('hidden');
            
            // Badge & Summary
            const badge = document.getElementById('statusBadge');
            badge.innerText = `[ ${data.summary?.severity} ] : ${data.summary?.overall_critique}`;
            badge.className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border-2 shadow-sm ${
                data.summary?.severity === 'Nặng' ? 'bg-red-50 border-red-200 text-red-600' : 'bg-emerald-50 border-emerald-200 text-emerald-600'
            }`;
            badge.classList.remove('hidden');

            // Render Logic
            document.getElementById('logicCount').innerText = `${data.summary?.logic_count || 0} LỖI`;
            document.getElementById('logicContainer').innerHTML = (data.logic_errors || []).map(err => `
                <div class="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm hover:border-amber-300 transition-all group">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[8px] font-black bg-amber-500 text-white px-2 py-0.5 rounded uppercase tracking-tighter">${err.issue}</span>
                        <span class="text-[10px] text-slate-400 font-mono italic truncate">Vị trí: ${err.location}</span>
                    </div>
                    <p class="text-amber-800 text-sm leading-relaxed font-bold italic border-l-2 border-amber-200 pl-4 bg-amber-50/30 py-2 rounded-r-lg">
                        ${err.argument}
                    </p>
                </div>
            `).join('') || "<div class='p-8 text-center text-slate-300 italic text-sm'>Văn bản mạch lạc vô song.</div>";

            // Render Linguistic
            document.getElementById('lingCount').innerText = `${data.summary?.typo_count || 0} LỖI`;
            document.getElementById('morassContainer').innerHTML = (data.linguistic_errors || []).map(err => `
                <div class="bg-white p-4 rounded-2xl border border-blue-50 shadow-sm flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] font-black uppercase bg-blue-100 text-blue-600 px-2 py-0.5 rounded">${err.type}</span>
                        <span class="text-[10px] text-slate-400 italic font-medium">${err.location}</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-slate-300 line-through text-xs italic">${err.original}</span>
                        <span class="text-blue-700 font-black text-base italic">→ ${err.corrected}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 font-medium leading-tight mt-1 border-t pt-2 border-slate-50">${err.note}</p>
                </div>
            `).join('') || "<div class='p-8 text-center text-slate-300 italic text-sm'>Chính tả sạch như lau như ly.</div>";
        }

        // Đọc Docx
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ae) => {
                mammoth.extractRawText({ arrayBuffer: ae.target.result })
                    .then(r => document.getElementById('editor').value = r.value);
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
