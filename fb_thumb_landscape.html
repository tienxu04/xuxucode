<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Thumbnail Pro - Drag & Pan Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .serif { font-family: 'Merriweather', serif; }
        .preview-container { width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid #334155; background: #000; position: relative; overflow: hidden; display: none; aspect-ratio: 1200/630; }
        .canvas-area { width: 1200px; height: 630px; position: absolute; top: 0; left: 0; transform-origin: top left; background: #000; overflow: hidden; }
        .movable-img { position: absolute; cursor: move; user-select: none; touch-action: none; }
        .drop-zone.dragover { border-color: #38bdf8; background: #1e293b; }
        .text-shadow-heavy { text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        /* Label Fix: Đảm bảo padding bottom rộng và cân đối khi export */
        .smart-label {
            display: table;
            line-height: 1;
            padding: 10px 20px 14px 20px; 
            text-transform: uppercase;
            font-weight: 900;
            color: white;
            border-radius: 2px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic uppercase">News <span class="text-blue-500 underline">Editor</span></h1>
            <div id="statusTagUI" class="bg-yellow-500 text-black px-3 py-1 rounded text-xs font-bold uppercase tracking-widest">Editing</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div id="dropZone" class="p-8 border-2 border-dashed border-slate-600 rounded-xl text-center cursor-pointer hover:bg-slate-800 transition relative">
                    <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    <p class="text-slate-400 text-sm italic pointer-events-none">Kéo thả ảnh vào đây hoặc click để chọn</p>
                </div>

                <div class="space-y-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-2xl">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Headline</label>
                        <textarea id="headlineInput" rows="2" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none focus:ring-1 focus:ring-blue-500">Tiêu đề bài viết</textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Mô tả</label>
                        <textarea id="descInput" rows="3" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none focus:ring-1 focus:ring-blue-500"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tag</label>
                            <select id="tagSelect" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none">
                                <option value="NEWS">NEWS</option>
                                <option value="FOOD">FOOD</option>
                                <option value="LIFESTYLE">LIFESTYLE</option>
                                <option value="OTHER">KHÁC...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Màu sắc</label>
                            <input type="color" id="colorPicker" value="#cc0000" class="w-full h-9 rounded cursor-pointer bg-slate-900 border-none">
                        </div>
                    </div>

                    <div id="customTagWrap" class="hidden">
                        <input id="customTagInput" type="text" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm" placeholder="Nhập nhãn tùy chỉnh...">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Kiểu hiển thị</label>
                        <select id="styleSelect" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none">
                            <option value="1">Style 1: Overlay (Mặc định)</option>
                            <option value="2">Style 2: Split Sidebar</option>
                            <option value="3">Style 3: Bottom Bar</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="previewBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg">XEM TRƯỚC</button>
                    <button id="downloadBtn" class="hidden flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-lg">TẢI PNG</button>
                    <button id="editBtn" class="hidden flex-1 bg-slate-600 hover:bg-slate-700 text-white font-bold py-3 rounded-lg">SỬA LẠI</button>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col items-center justify-start border-2 border-slate-800 rounded-2xl bg-slate-900/50 p-4 min-h-[400px]">
                <div id="previewContainer" class="preview-container shadow-2xl">
                    <div id="mainCanvas" class="canvas-area">
                        <img id="movableImg" src="" class="movable-img" draggable="false">
                        <div id="styleContent" class="absolute inset-0 w-full h-full pointer-events-none"></div>
                        <div id="logoBox" class="absolute top-6 right-8 z-50 pointer-events-none">
                            <img src="https://tienxu04.github.io/xuxucode/logo_ttn.png" class="h-16 drop-shadow-lg" crossorigin="anonymous">
                        </div>
                    </div>
                </div>
                <div id="emptyMsg" class="mt-20 text-slate-500 italic">Vui lòng tải ảnh lên để bắt đầu</div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const movableImg = document.getElementById('movableImg');
        const mainCanvas = document.getElementById('mainCanvas');
        const styleContent = document.getElementById('styleContent');
        const colorPicker = document.getElementById('colorPicker');
        const styleSelect = document.getElementById('styleSelect');
        const tagSelect = document.getElementById('tagSelect');

        let isDragging = false;
        let startX, startY, imgX = 0, imgY = 0;
        let currentMode = 'editing';

        // --- UPLOAD LOGIC ---
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });
        imageInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                movableImg.src = e.target.result;
                movableImg.onload = () => {
                    const canvasW = 1200, canvasH = 630;
                    const scale = Math.max(canvasW / movableImg.naturalWidth, canvasH / movableImg.naturalHeight);
                    movableImg.style.width = (movableImg.naturalWidth * scale) + 'px';
                    movableImg.style.height = (movableImg.naturalHeight * scale) + 'px';
                    imgX = -(parseInt(movableImg.style.width) - canvasW) / 2;
                    imgY = -(parseInt(movableImg.style.height) - canvasH) / 2;
                    movableImg.style.left = imgX + 'px';
                    movableImg.style.top = imgY + 'px';
                    
                    document.getElementById('previewContainer').style.display = 'block';
                    document.getElementById('emptyMsg').style.display = 'none';
                    updateDesign();
                    resizeUI();
                };
            };
            reader.readAsDataURL(file);
        }

        // --- PAN LOGIC ---
        const startPan = (e) => {
            if(currentMode !== 'editing') return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = mainCanvas.getBoundingClientRect();
            const scaleUI = rect.width / 1200;
            startX = clientX / scaleUI - imgX;
            startY = clientY / scaleUI - imgY;
        };

        const doPan = (e) => {
            if(!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = mainCanvas.getBoundingClientRect();
            const scaleUI = rect.width / 1200;
            imgX = clientX / scaleUI - startX;
            imgY = clientY / scaleUI - startY;
            movableImg.style.left = imgX + 'px';
            movableImg.style.top = imgY + 'px';
        };

        mainCanvas.addEventListener('mousedown', startPan);
        mainCanvas.addEventListener('touchstart', startPan, {passive: false});
        window.addEventListener('mousemove', doPan);
        window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); doPan(e); } }, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        // --- DESIGN LOGIC ---
        function updateDesign() {
            const h = document.getElementById('headlineInput').value;
            const d = document.getElementById('descInput').value.replace(/\n/g, '<br>');
            const c = colorPicker.value;
            const s = styleSelect.value;
            const tag = tagSelect.value === 'OTHER' ? document.getElementById('customTagInput').value : tagSelect.value;
            
            let html = '';
            if (s === "1") {
                html = `<div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-0 left-0 p-12 w-full">
                            <div class="smart-label text-xl tracking-widest mb-4" style="background:${c}">${tag}</div>
                            <h1 class="text-white text-6xl font-black leading-[1.1] mb-4 text-shadow-heavy">${h}</h1>
                            <p class="text-gray-300 text-2xl font-light leading-snug text-shadow-heavy">${d}</p>
                        </div>`;
            } else if (s === "2") {
                html = `<div class="absolute inset-0 flex">
                            <div class="w-5/12 h-full p-12 flex flex-col justify-center border-r-[15px] border-white/10" style="background:${c}">
                                <span class="text-white/60 text-sm font-bold tracking-widest mb-6 border-b-2 border-white/30 w-fit pb-2 uppercase">${tag}</span>
                                <h1 class="text-white text-5xl font-bold leading-tight serif mb-6">${h}</h1>
                                <p class="text-white/70 text-xl font-light leading-relaxed">${d}</p>
                            </div>
                        </div>`;
            } else {
                html = `<div class="absolute bottom-0 left-0 w-full p-10 border-t-4 border-white/20" style="background:${c}">
                            <div class="mb-3">
                                <span class="bg-white text-[13px] font-black px-4 py-2 uppercase" style="color:${c}">${tag}</span>
                            </div>
                            <h1 class="text-white text-5xl font-black uppercase tracking-tighter mb-1 text-shadow-heavy">${h}</h1>
                            <p class="text-white/80 text-2xl font-light leading-snug">${d}</p>
                        </div>`;
            }
            styleContent.innerHTML = html;
        }

        [headlineInput, descInput, colorPicker, styleSelect, tagSelect, customTagInput].forEach(el => el.oninput = updateDesign);

        function resizeUI() {
            const container = document.getElementById('previewContainer');
            const scale = Math.min((container.parentElement.offsetWidth - 32) / 1200, 1);
            mainCanvas.style.transform = `scale(${scale})`;
            container.style.height = (630 * scale) + 'px';
        }
        window.onresize = resizeUI;

        // --- BUTTONS ---
        const previewBtn = document.getElementById('previewBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const editBtn = document.getElementById('editBtn');
        const statusTagUI = document.getElementById('statusTagUI');

        previewBtn.onclick = () => {
            currentMode = 'preview';
            statusTagUI.innerText = "Preview Mode";
            statusTagUI.className = "bg-emerald-500 text-white px-3 py-1 rounded text-xs font-bold uppercase tracking-widest";
            movableImg.style.cursor = 'default';
            [previewBtn, downloadBtn, editBtn].forEach(b => b.classList.toggle('hidden'));
        };

        editBtn.onclick = () => {
            currentMode = 'editing';
            statusTagUI.innerText = "Editing";
            statusTagUI.className = "bg-yellow-500 text-black px-3 py-1 rounded text-xs font-bold uppercase tracking-widest";
            movableImg.style.cursor = 'move';
            [previewBtn, downloadBtn, editBtn].forEach(b => b.classList.toggle('hidden'));
        };

        downloadBtn.onclick = () => {
            const originalTransform = mainCanvas.style.transform;
            mainCanvas.style.transform = 'none';
            html2canvas(mainCanvas, { width: 1200, height: 630, scale: 2, useCORS: true }).then(canvas => {
                mainCanvas.style.transform = originalTransform;
                const link = document.createElement('a');
                link.download = `news-thumb-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        };
    </script>
</body>
</html>
