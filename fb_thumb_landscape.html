<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Thumbnail Pro - v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .serif { font-family: 'Merriweather', serif; }
        .preview-container { width: 100%; max-width: 800px; margin: 0 auto; border: 2px solid #334155; background: #1e293b; position: relative; overflow: hidden; display: none; }
        .canvas-area { width: 1200px; height: 630px; position: relative; transform-origin: top left; background: #000; overflow: hidden; }
        .movable-img { position: absolute; cursor: move; user-select: none; transition: none; }
        .drop-zone { border: 2px dashed #475569; transition: all 0.3s; }
        .drop-zone.dragover { background: #334155; border-color: #38bdf8; }
        .text-shadow-heavy { text-shadow: 2px 2px 10px rgba(0,0,0,0.8), 0px 0px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">NEWS <span class="text-blue-500 underline">EDITOR</span></h1>
            <div id="statusTagUI" class="bg-yellow-500 text-black px-3 py-1 rounded text-xs font-bold uppercase tracking-widest">Editing</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div id="dropZone" class="drop-zone p-5 rounded-xl text-center cursor-pointer hover:bg-slate-800">
                    <input type="file" id="imageInput" class="hidden" accept="image/*">
                    <p class="text-slate-400 text-sm italic">Kéo thả ảnh hoặc bấm để chọn</p>
                </div>

                <div class="space-y-4 bg-slate-800 p-5 rounded-xl shadow-2xl border border-slate-700">
                    <div class="flex items-center gap-2 pb-2 border-b border-slate-700">
                        <input type="checkbox" id="logoToggle" checked class="w-4 h-4 accent-blue-500 cursor-pointer">
                        <label for="logoToggle" class="text-xs font-bold text-slate-300 cursor-pointer uppercase">Hiển thị Logo</label>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tiêu đề (Headline)</label>
                        <textarea id="headlineInput" rows="2" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none focus:ring-1 focus:ring-blue-500">Vietnam welcomes millions of international tourists in 2024</textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mô tả (Short Description)</label>
                        <textarea id="descInput" rows="3" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none focus:ring-1 focus:ring-blue-500" placeholder="Nhập mô tả..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nhãn (Tag)</label>
                            <select id="tagSelect" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none">
                                <option value="NEWS">NEWS</option>
                                <option value="FOOD">FOOD</option>
                                <option value="LIFESTYLE">LIFESTYLE</option>
                                <option value="OTHER">KHÁC...</option>
                            </select>
                        </div>
                        <div id="customTagWrap" class="hidden">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nhập nhãn</label>
                            <input id="customTagInput" type="text" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none" placeholder="...">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Màu chủ đạo</label>
                            <input type="color" id="colorPicker" value="#cc0000" class="w-full h-9 rounded cursor-pointer bg-slate-900 border-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Kiểu dáng</label>
                            <select id="styleSelect" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white text-sm outline-none">
                                <option value="1">Style 1: Overlay</option>
                                <option value="2">Style 2: Split</option>
                                <option value="3">Style 3: Bottom</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="previewBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:-translate-y-1">XEM TRƯỚC</button>
                    <button id="downloadBtn" class="hidden flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-lg transition">TẢI PNG</button>
                    <button id="editBtn" class="hidden flex-1 bg-slate-600 hover:bg-slate-700 text-white font-bold py-3 rounded-lg transition">SỬA LẠI</button>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col items-center justify-start min-h-[500px] border-2 border-slate-800 rounded-2xl bg-slate-900/50 p-4 overflow-hidden">
                <div id="previewContainer" class="preview-container shadow-2xl">
                    <div id="mainCanvas" class="canvas-area">
                        <img id="movableImg" src="" class="movable-img" draggable="false">
                        <div id="styleContent" class="absolute inset-0 w-full h-full pointer-events-none"></div>
                        <div id="logoBox" class="logo-box absolute top-6 right-8 pointer-events-none z-50">
                            <img src="https://tienxu04.github.io/xuxucode/logo_ttn.png" class="h-16 drop-shadow-lg" crossorigin="anonymous">
                        </div>
                    </div>
                </div>
                <div id="emptyMsg" class="mt-20 text-slate-500 text-center italic">
                    <p>Vui lòng tải ảnh lên để hiển thị preview</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const movableImg = document.getElementById('movableImg');
        const mainCanvas = document.getElementById('mainCanvas');
        const previewContainer = document.getElementById('previewContainer');
        const styleContent = document.getElementById('styleContent');
        const logoBox = document.getElementById('logoBox');
        const logoToggle = document.getElementById('logoToggle');
        const tagSelect = document.getElementById('tagSelect');
        const customTagWrap = document.getElementById('customTagWrap');
        const customTagInput = document.getElementById('customTagInput');
        const headlineInput = document.getElementById('headlineInput');
        const descInput = document.getElementById('descInput');
        const colorPicker = document.getElementById('colorPicker');
        const styleSelect = document.getElementById('styleSelect');

        let isDragging = false;
        let startX, startY, imgX = 0, imgY = 0;
        let currentMode = 'editing';

        logoToggle.addEventListener('change', () => logoBox.style.opacity = logoToggle.checked ? "1" : "0");
        tagSelect.addEventListener('change', () => {
            customTagWrap.style.display = tagSelect.value === 'OTHER' ? 'block' : 'none';
            updateDesign();
        });

        function getActiveTag() {
            if (tagSelect.value === 'OTHER') return customTagInput.value || 'TITLE';
            return tagSelect.value;
        }

        dropZone.onclick = () => imageInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
        imageInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            if (files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    movableImg.src = e.target.result;
                    movableImg.onload = () => {
                        autoFitImage();
                        previewContainer.style.display = 'block';
                        document.getElementById('emptyMsg').style.display = 'none';
                        updateDesign();
                        resizePreviewUI();
                    };
                };
                reader.readAsDataURL(files[0]);
            }
        }

        function autoFitImage() {
            const canvasW = 1200, canvasH = 630;
            const imgW = movableImg.naturalWidth, imgH = movableImg.naturalHeight;
            const canvasRatio = canvasW / canvasH, imgRatio = imgW / imgH;
            
            // Luôn đảm bảo ảnh bao phủ toàn bộ canvas (Object-fit: cover logic)
            if (imgRatio > canvasRatio) {
                const newW = imgW * (canvasH / imgH);
                movableImg.style.height = canvasH + 'px';
                movableImg.style.width = newW + 'px';
                imgX = -(newW - canvasW) / 2; imgY = 0;
            } else {
                const newH = imgH * (canvasW / imgW);
                movableImg.style.width = canvasW + 'px';
                movableImg.style.height = newH + 'px';
                imgX = 0; imgY = -(newH - canvasH) / 2;
            }
            movableImg.style.left = imgX + 'px';
            movableImg.style.top = imgY + 'px';
        }

        const startDrag = (e) => {
            if (currentMode !== 'editing') return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleUI = mainCanvas.getBoundingClientRect().width / 1200;
            startX = clientX / scaleUI - imgX;
            startY = clientY / scaleUI - imgY;
        };

        const moveDrag = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleUI = mainCanvas.getBoundingClientRect().width / 1200;
            imgX = clientX / scaleUI - startX;
            imgY = clientY / scaleUI - startY;
            movableImg.style.left = imgX + 'px';
            movableImg.style.top = imgY + 'px';
        };

        mainCanvas.addEventListener('mousedown', startDrag);
        mainCanvas.addEventListener('touchstart', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        [headlineInput, descInput, customTagInput, colorPicker, styleSelect].forEach(el => el.addEventListener('input', updateDesign));

        function updateDesign() {
            const h = headlineInput.value;
            const d = descInput.value.replace(/\n/g, '<br>');
            const c = colorPicker.value;
            const s = styleSelect.value;
            const tag = getActiveTag();

            let html = '';
            // Tối ưu Padding Label (Visual Centering) bằng inline-flex và line-height: 1
            if (s === "1") {
                html = `<div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-0 left-0 p-12 w-full">
                            <span class="inline-flex items-center justify-center text-white text-lg font-bold px-4 pt-1.5 pb-2.5 mb-4 rounded-sm shadow-lg uppercase tracking-wider" style="background:${c}; line-height: 1;">${tag}</span>
                            <h1 class="text-white text-6xl font-black leading-[1.1] mb-4 text-shadow-heavy">${h}</h1>
                            <p class="text-gray-300 text-2xl font-light leading-snug text-shadow-heavy">${d}</p>
                        </div>`;
            } else if (s === "2") {
                html = `<div class="absolute inset-0 flex">
                            <div class="w-5/12 h-full p-12 flex flex-col justify-center border-r-[15px] border-white/10" style="background-color: ${c}">
                                <span class="inline-block text-white/60 text-sm font-bold tracking-widest mb-6 border-b-2 border-white/30 w-fit pb-2 uppercase">${tag}</span>
                                <h1 class="text-white text-5xl font-bold leading-tight serif mb-6">${h}</h1>
                                <p class="text-white/70 text-xl font-light leading-relaxed">${d}</p>
                            </div>
                        </div>`;
            } else {
                html = `<div class="absolute bottom-0 left-0 w-full p-10 border-t-4 border-white/20" style="background-color: ${c}">
                            <span class="inline-flex items-center justify-center bg-white text-[13px] font-black px-3 pt-1.5 pb-2 mb-3 rounded-sm uppercase tracking-tight" style="color: ${c}; line-height: 1;">${tag}</span>
                            <h1 class="text-white text-5xl font-black uppercase tracking-tighter mb-2 text-shadow-heavy">${h}</h1>
                            <p class="text-white/80 text-2xl font-light leading-snug">${d}</p>
                        </div>`;
            }
            styleContent.innerHTML = html;
        }

        function resizePreviewUI() {
            const containerWidth = previewContainer.parentElement.offsetWidth - 32;
            const scale = Math.min(containerWidth / 1200, 1);
            mainCanvas.style.transform = `scale(${scale})`;
            previewContainer.style.height = (630 * scale) + 'px';
        }
        window.onresize = resizePreviewUI;

        const previewBtn = document.getElementById('previewBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const editBtn = document.getElementById('editBtn');
        const statusTagUI = document.getElementById('statusTagUI');

        previewBtn.onclick = () => {
            if (!movableImg.src) return alert("Vui lòng tải ảnh lên trước!");
            currentMode = 'preview';
            statusTagUI.innerText = "Preview Mode";
            statusTagUI.className = "bg-emerald-500 text-white px-3 py-1 rounded text-xs font-bold uppercase tracking-widest";
            movableImg.style.cursor = 'default';
            [previewBtn, downloadBtn, editBtn].forEach(b => b.classList.toggle('hidden'));
        };

        editBtn.onclick = () => {
            currentMode = 'editing';
            statusTagUI.innerText = "Editing";
            statusTagUI.className = "bg-yellow-500 text-black px-3 py-1 rounded text-xs font-bold uppercase tracking-widest";
            movableImg.style.cursor = 'move';
            [previewBtn, downloadBtn, editBtn].forEach(b => b.classList.toggle('hidden'));
        };

        downloadBtn.onclick = () => {
            const originalTransform = mainCanvas.style.transform;
            mainCanvas.style.transform = 'none';
            html2canvas(mainCanvas, { 
                width: 1200, height: 630, scale: 1, useCORS: true, allowTaint: true 
            }).then(canvas => {
                mainCanvas.style.transform = originalTransform;
                const link = document.createElement('a');
                link.download = `thumb-${getActiveTag()}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        };
    </script>
</body>
</html>
