<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Code Projects | Portfolio</title>
    
    <meta property="og:title" content="My Code Projects Portfolio">
    <meta property="og:description" content="Explore my latest coding vibes and projects.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1000">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            background: linear-gradient(45deg, var(--accent-color), #818cf8);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.4);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 1.1rem;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 400;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-card:hover::after {
            left: 100%;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">👨‍💻</div>
        <h1>My Coding Vibe</h1>
        <p class="subtitle">Personal Projects & Experiments</p>

        <div class="links-wrapper">
            <a href="https://ai-translator-zeta.vercel.app/" target="_blank" class="link-card">
                <span>🤖 AI book translator</span>
            </a>

            <a href="https://xudible-app.vercel.app/" target="_blank" class="link-card">
                <span>🎧 Xudible</span>
            </a>

            <a href="https://xudacook.vercel.app/index.html" target="_blank" class="link-card">
                <span>👨‍🍳 Xucook</span>
            </a>

            <a href="https://screenshot-seven-phi.vercel.app/" target="_blank" class="link-card">
                <span>🍽️ XuEat</span>
            </a>

            <a href="https://tienxu04.github.io/reader/frontend/" target="_blank" class="link-card">
                <span>📑 XuPass</span>
            </a>
        </div>

        <footer>
            Built with ❤️ in 2026
        </footer>
    </div>

</body>
</html>
