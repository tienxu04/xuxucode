<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portrait News Card Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 2rem; color: #1e293b; }
        
        .input-section {
            background: white; padding: 1.5rem; border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1.5rem;
        }
        .input-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem; }
        
        .upload-box {
            border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 1.5rem;
            text-align: center; cursor: pointer; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .upload-box.dragover { border-color: #3b82f6; background: #eff6ff; }
        
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155; }
        input[type="text"] {
            width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1;
            border-radius: 0.5rem; font-size: 1rem;
        }

        .editor-card { background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-body { padding: 1.5rem; }
        
        .canvas-wrapper { 
            border: 1px solid #e2e8f0; border-radius: 0.5rem; 
            overflow: hidden; cursor: grab; position: relative;
            touch-action: none; background: #f1f5f9;
        }
        .canvas-wrapper:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: auto; }

        .btn-download {
            width: 100%; padding: 1rem; background: #3b82f6; color: white;
            border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;
            margin-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-size: 1rem;
        }
        .btn-download:hover { background: #2563eb; }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Portrait News Card</h1>
            <p style="color: #64748b;">Tỷ lệ chuẩn 4:5 cho Social Media</p>
        </div>

        <div class="input-section">
            <div class="input-grid">
                <div id="dropZone" class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div style="font-size: 2rem;">📤</div>
                    <div style="font-weight: 500; color: #64748b; font-size: 0.9rem;">Chạm để chọn ảnh</div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
                <div>
                    <label>Headline</label>
                    <input type="text" id="headline" placeholder="Nhập tiêu đề tin tức...">
                    <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
                        💡 Mẹo: Vuốt trực tiếp lên ảnh ở dưới để căn chỉnh vị trí.
                    </p>
                </div>
            </div>
        </div>

        <div class="editor-card">
            <div class="card-body">
                <div class="canvas-wrapper" id="portraitWrapper">
                    <canvas id="canvasPortrait"></canvas>
                </div>
                <button class="btn-download" onclick="downloadCanvas()">
                    <span>⬇</span> Tải xuống bản Portrait
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let logoImage = null;
        let isDragging = false;
        let startY = 0;
        let currentYOffset = 0; 
        const logoSrc = 'logo_ttn_white.png';

        // Load Logo
        const loadLogo = () => {
            logoImage = new Image();
            logoImage.src = logoSrc;
            logoImage.onload = () => render();
        };

        // Hàm Wrap Text
        const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
            const words = text.split(' ');
            let line = '';
            let lines = [];
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    lines.push({ text: line, y: y });
                    line = words[n] + ' ';
                    y += lineHeight;
                } else { line = testLine; }
            }
            lines.push({ text: line, y: y });
            return lines;
        };

        // Hàm vẽ chính
        const render = () => {
            const canvas = document.getElementById('canvasPortrait');
            const ctx = canvas.getContext('2d');
            canvas.width = 1080; canvas.height = 1350;

            // Vẽ ảnh nền (2/3 phía trên)
            if (currentImage) {
                const imgAreaH = 900;
                const scale = Math.max(canvas.width / currentImage.width, imgAreaH / currentImage.height);
                const sw = currentImage.width * scale; 
                const sh = currentImage.height * scale;
                
                ctx.save(); 
                ctx.rect(0, 0, canvas.width, imgAreaH); 
                ctx.clip();
                ctx.drawImage(currentImage, (canvas.width - sw)/2, (imgAreaH - sh)/2 + currentYOffset, sw, sh);
                ctx.restore();

                // Gradient che mờ phần dưới ảnh
                const grad = ctx.createLinearGradient(0, imgAreaH - 150, 0, imgAreaH);
                grad.addColorStop(0, 'rgba(0,0,0,0)'); 
                grad.addColorStop(1, 'rgba(0,0,0,0.7)');
                ctx.fillStyle = grad; 
                ctx.fillRect(0, imgAreaH - 150, canvas.width, 150);
            } else {
                ctx.fillStyle = '#f1f5f9';
                ctx.fillRect(0, 0, canvas.width, 900);
            }

            // Phần chân trang màu đỏ
            ctx.fillStyle = '#e30f16'; 
            ctx.fillRect(0, 900, canvas.width, 450);

            // Vẽ Headline
            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'bold 64px Arial';
            const headlineText = document.getElementById('headline').value || 'Your Headline Here';
            const lines = wrapText(ctx, headlineText, 60, 985, 960, 85);
            lines.forEach(l => ctx.fillText(l.text, 60, l.y));

            // Logo và Text phụ
            if (logoImage && logoImage.complete) {
                const lh = 55; 
                const lw = (logoImage.width/logoImage.height)*lh;
                ctx.drawImage(logoImage, canvas.width - lw - 60, canvas.height - 85, lw, lh);
                
                ctx.font = '32px Arial'; 
                ctx.globalAlpha = 0.9;
                ctx.fillText('Link in comments', 60, canvas.height - 85 + (lh/1.5));
                ctx.globalAlpha = 1.0;
            }
        };

        // --- XỬ LÝ KÉO (PAN) ---
        const pCanvas = document.getElementById('canvasPortrait');
        const startDrag = (y) => { if(!currentImage) return; isDragging = true; startY = y - currentYOffset; };
        const moveDrag = (y) => { if(!isDragging) return; currentYOffset = y - startY; render(); };
        const endDrag = () => { isDragging = false; };

        pCanvas.addEventListener('mousedown', (e) => startDrag(e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientY));
        window.addEventListener('mouseup', endDrag);

        pCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); moveDrag(e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchend', endDrag);

        // --- UPLOAD ---
        const handleFiles = (files) => {
            if (files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => { currentImage = img; currentYOffset = 0; render(); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(files[0]);
            }
        };

        const dz = document.getElementById('dropZone');
        ['dragover', 'drop'].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); if(ev==='drop') handleFiles(e.dataTransfer.files); }));
        document.getElementById('imageInput').addEventListener('change', (e) => handleFiles(e.target.files));
        document.getElementById('headline').addEventListener('input', render);
        
        const downloadCanvas = () => {
            const link = document.createElement('a');
            link.download = 'news-portrait-4x5.png';
            link.href = document.getElementById('canvasPortrait').toDataURL();
            link.click();
        };

        loadLogo();
    </script>
</body>
</html>
