<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dò Số Miền Nam v3.1 @ xuxukun </title>
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #ffc107;
            --bg: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin: 0 0 20px 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--secondary);
            display: block;
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 13px;
            color: #666;
            padding-left: 5px;
        }

        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #fff;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
            outline: none;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, #d32f2f, #f44336);
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3);
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }

        #status { 
            margin-top: 20px; 
            padding: 15px; 
            display: none; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: 600;
        }

        .loading { background: #e3f2fd; color: #0d47a1; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .fail { background: #fff5f5; color: #c62828; border: 1px solid #fed7d7; }

        .lottery-table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 8px;
            margin-top: 20px; 
            display: none; 
        }

        .lottery-table td { 
            background: #fff;
            padding: 12px 8px; 
            text-align: center; 
            font-weight: 700;
            font-size: 18px;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .g-label { 
            background: #f8f8f8 !important; 
            color: #999; 
            width: 50px; 
            font-size: 11px !important; 
            border-radius: 8px 0 0 8px;
            border-left: 1px solid #eee;
        }

        .val-cell {
            border-radius: 0 8px 8px 0;
            border-right: 1px solid #eee;
        }

        .text-red { color: var(--primary); font-size: 20px !important; }
        
        .highlight { 
            background: #fff9c4 !important; 
            color: #d32f2f !important;
            border: 2px solid var(--secondary) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dò Số Miền Nam</h2>
    
    <div class="form-group">
        <label>Ngày quay số</label>
        <input type="date" id="dateInput">
    </div>

    <div class="form-group">
        <label>Đài quay thưởng</label>
        <select id="stationSelect"></select>
    </div>

    <div class="form-group">
        <label>Số cần dò</label>
        <input type="number" id="numInput" placeholder="Nhập số vé của bạn" pattern="\d*">
    </div>

    <button onclick="checkResult()" id="btnAction">DÒ KẾT QUẢ</button>

    <div id="status"></div>

    <table class="lottery-table" id="resultTable">
        <tr><td class="g-label">ĐB</td><td id="g-db" class="val-cell text-red"></td></tr>
        <tr><td class="g-label">G1</td><td id="g-1" class="val-cell"></td></tr>
        <tr><td class="g-label">G2</td><td id="g-2" class="val-cell"></td></tr>
        <tr><td class="g-label">G3</td><td id="g-3" class="val-cell"></td></tr>
        <tr><td class="g-label">G4</td><td id="g-4" class="val-cell"></td></tr>
        <tr><td class="g-label">G5</td><td id="g-5" class="val-cell"></td></tr>
        <tr><td class="g-label">G6</td><td id="g-6" class="val-cell"></td></tr>
        <tr><td class="g-label">G7</td><td id="g-7" class="val-cell"></td></tr>
        <tr><td class="g-label">G8</td><td id="g-8" class="val-cell text-red"></td></tr>
    </table>
</div>

<script>
    // Cập nhật Slug: Lâm Đồng -> lam-dong, xsld
    const SLUGS = {
        'xshcm':'ho-chi-minh', 'xsdt':'dong-thap', 'xscm':'ca-mau',
        'xsbt':'ben-tre', 'xsvt':'vung-tau', 'xsbl':'bac-lieu',
        'xsdn':'dong-nai', 'xsct':'can-tho', 'xsst':'soc-trang',
        'xstn':'tay-ninh', 'xsag':'an-giang', 'xsbth':'binh-thuan',
        'xsvl':'vinh-long', 'xsbd':'binh-duong', 'xstv':'tra-vinh',
        'xsla':'long-an', 'xsbp':'binh-phuoc', 'xshg':'hau-giang',
        'xstg':'tien-giang', 'xskg':'kien-giang', 'xsld':'lam-dong'
    };

    const SCHEDULE = {
        1: [{n:'TP. Hồ Chí Minh', c:'xshcm'}, {n:'Đồng Tháp', c:'xsdt'}, {n:'Cà Mau', c:'xscm'}],
        2: [{n:'Bến Tre', c:'xsbt'}, {n:'Vũng Tàu', c:'xsvt'}, {n:'Bạc Liêu', c:'xsbl'}],
        3: [{n:'Đồng Nai', c:'xsdn'}, {n:'Cần Thơ', c:'xsct'}, {n:'Sóc Trăng', c:'xsst'}],
        4: [{n:'Tây Ninh', c:'xstn'}, {n:'An Giang', c:'xsag'}, {n:'Bình Thuận', c:'xsbth'}],
        5: [{n:'Vĩnh Long', c:'xsvl'}, {n:'Bình Dương', c:'xsbd'}, {n:'Trà Vinh', c:'xstv'}],
        6: [{n:'TP. Hồ Chí Minh', c:'xshcm'}, {n:'Long An', c:'xsla'}, {n:'Bình Phước', c:'xsbp'}, {n:'Hậu Giang', c:'xshg'}],
        0: [{n:'Tiền Giang', c:'xstg'}, {n:'Kiên Giang', c:'xskg'}, {n:'Lâm Đồng', c:'xsld'}]
    };

    window.onload = () => {
        const d = new Date();
        document.getElementById('dateInput').valueAsDate = d;
        updateStations(d);
    };

    document.getElementById('dateInput').onchange = (e) => {
        if(e.target.value) updateStations(new Date(e.target.value));
    };

    function updateStations(date) {
        const list = SCHEDULE[date.getDay()];
        const sel = document.getElementById('stationSelect');
        sel.innerHTML = list.map(s => `<option value="${s.c}">${s.n}</option>`).join('');
    }

async function checkResult() {
    const num = document.getElementById('numInput').value.trim();
    const code = document.getElementById('stationSelect').value;
    const dateRaw = document.getElementById('dateInput').value;
    const btn = document.getElementById('btnAction');
    const st = document.getElementById('status');
    const table = document.getElementById('resultTable');

    if(!num) return alert("Bạn chưa nhập số vé!");

    btn.disabled = true;
    st.style.display = 'block';
    st.className = 'loading';
    st.innerText = "Đang kết nối server...";
    table.style.display = 'none';

    try {
        const url = `https://xskt.com.vn/rss-feed/${SLUGS[code]}-${code}.rss`;
        const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
        
        console.log("%c--- 1. ĐANG FETCH ---", "color: cyan; font-weight: bold;");
        console.log("URL gốc:", url);

        const resp = await fetch(proxy);
        const rawText = await resp.text(); 
        
        // Soi dữ liệu thô ngay khi Proxy vừa trả về
        console.log("%c--- 2. DỮ LIỆU THÔ TỪ PROXY ---", "color: yellow; font-weight: bold;");
        console.log(rawText); 
        
        const [y, m, d] = dateRaw.split('-');
        const dateFull = `${d}/${m}`; 
        const dateShort = `${parseInt(d)}/${parseInt(m)}`;
        console.log(`%c--- 3. TÌM KIẾM NGÀY: ${dateFull} hoặc ${dateShort} ---`, "color: magenta;");

        // Regex thần thánh: Cắt lát từng thẻ <item>
        const itemMatches = rawText.match(/<item>[\s\S]*?<\/item>/g);
        
        if (!itemMatches) {
            console.error("LỖI: Không tìm thấy thẻ <item> nào trong rawText!");
            throw new Error("Dữ liệu từ máy chủ không đúng cấu trúc RSS.");
        }

        let dataRaw = null;
        for (const itemStr of itemMatches) {
            const title = (itemStr.match(/<title>([\s\S]*?)<\/title>/) || [])[1] || "";
            console.log("Đang check Title:", title);

            if (title.includes(dateFull) || title.includes(dateShort)) {
                dataRaw = (itemStr.match(/<description>([\s\S]*?)<\/description>/) || [])[1] || "";
                console.log("%c=> KHỚP NGÀY! Nội dung giải:", "color: green; font-weight: bold;", dataRaw);
                break;
            }
        }

        if(!dataRaw) throw new Error(`Không tìm thấy kết quả ngày ${dateFull}`);

        // Xử lý sạch CDATA
        dataRaw = dataRaw.replace(/<!\[CDATA\[|\]\]>/g, "").trim();

        const prizes = parseData(dataRaw);
        console.log("--- 4. DỮ LIỆU ĐÃ PARSE XONG ---", prizes);
        
        displayTable(prizes);

        let wins = [];
        // Reset highlight cũ trước khi dò mới
        document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));

        for(let k in prizes) {
            prizes[k].forEach(v => {
                if(v.endsWith(num)) {
                    wins.push(k === 'db' ? 'Đặc Biệt' : 'Giải ' + k.toUpperCase());
                    const cell = document.getElementById('g-' + k);
                    if(cell) cell.classList.add('highlight');
                }
            });
        }

        st.className = wins.length ? 'success' : 'fail';
        st.innerHTML = wins.length ? `🎉 TRÚNG THƯỞNG!<br>${wins.join(', ')}` : "❌ KHÔNG TRÚNG GIẢI";

    } catch (e) {
        st.className = 'fail';
        st.innerText = e.message;
        console.error("%c--- LỖI XẢY RA ---", "color: red;", e);
    } finally {
        btn.disabled = false;
    }
}

    function parseData(txt) {
    console.log("%c--- 4. ĐANG PHÂN TÍCH CHUỖI ---", "color: orange;");
    
    // Bước 1: Chuẩn hóa khoảng trắng và xóa các ký tự lạ
    let cleanTxt = txt.replace(/\s+/g, ' ').trim();
    
    // Bước 2: Regex tách dựa trên nhãn giải. 
    // Dùng :? để chấp nhận cả "ĐB:" và "ĐB"
    const parts = cleanTxt.split(/(ĐB:?|1:?|2:?|3:?|4:?|5:?|6:?|7:?|8:?)/i);
    
    let res = {};
    for(let i = 1; i < parts.length; i += 2) {
        // Chuẩn hóa key: "ĐB:" -> "db", "1:" -> "1"
        let label = parts[i].toLowerCase().replace(':', '').trim();
        let key = (label === 'đb') ? 'db' : label;
        
        // Lấy giá trị sau nhãn, tách thành mảng các số (ví dụ: "123456 - 789012" -> ["123456", "789012"])
        let values = parts[i+1].trim().split(/[\s-]+/).filter(s => s.length >= 2);
        
        res[key] = values;
    }
    
    console.log("Kết quả parse cuối cùng:", res);
    return res;
}
    function displayTable(data) {
        document.getElementById('resultTable').style.display = 'table';
        for(let k in data) {
            const el = document.getElementById('g-'+k);
            if(el) {
                el.innerText = data[k].join(' - ');
                el.classList.remove('highlight');
            }
        }
    }
</script>
</body>
</html>
